<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Birthday Surprise</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#120024,#3b0a57);color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
.card{backdrop-filter:blur(10px);background:rgba(255,255,255,.12);padding:40px;border-radius:20px;text-align:center;max-width:600px}
button{padding:14px 24px;border:none;border-radius:30px;font-size:18px;cursor:pointer}
.heart{position:fixed;bottom:-20px;font-size:22px;animation:rise 6s linear infinite}
@keyframes rise{to{transform:translateY(-110vh);opacity:0}}
</style></head>
<body>
<div class="card">
<h1>🎂 Happy Birthday ❤️</h1>
<p>Someone special made this little surprise just for you.</p>
<button onclick="alert('More magical surprises coming soon! ❤️')">Begin the Journey</button>
</div>
<script>
for(let i=0;i<25;i++){
 let h=document.createElement('div');
 h.className='heart';
 h.textContent='💖';
 h.style.left=Math.random()*100+'vw';
 h.style.animationDelay=(Math.random()*6)+'s';
 document.body.appendChild(h);
}
</script>
</body></html>
